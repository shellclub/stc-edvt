name: Deploy STC-EDVT

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Navigate to project directory
            cd /root/stc-edvt || {
              echo "Project not found, cloning..."
              cd /root
              git clone https://github.com/shellclub/stc-edvt.git
              cd /root/stc-edvt
            }

            # Pull latest changes
            git pull origin main

            # Create database if not exists
            docker exec stc-admission-db mysql -uroot -p'technicalsuphanburi2023!!!' -e "CREATE DATABASE IF NOT EXISTS edvtstc CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;"

            # Import SQL if database is empty (first deploy)
            TABLE_COUNT=$(docker exec stc-admission-db mysql -uroot -p'technicalsuphanburi2023!!!' -N -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='edvtstc';" 2>/dev/null || echo "0")
            if [ "$TABLE_COUNT" = "0" ]; then
              echo "Importing students.sql..."
              docker cp students.sql stc-admission-db:/tmp/students.sql
              docker exec stc-admission-db mysql -uroot -p'technicalsuphanburi2023!!!' edvtstc -e "source /tmp/students.sql;"
            fi

            # Build and restart containers
            docker compose down
            docker compose up -d --build

            # Cleanup old images
            docker image prune -f

            echo "✅ Deploy completed! App running on port 8086"
